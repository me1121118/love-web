<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Special Message</title>

<style>
body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#E6E6FA,#D8BFD8);
font-family:tahoma;
overflow:hidden;
}

.container{
background:rgba(255,255,255,0.8);
padding:30px;
border-radius:25px;
text-align:center;
width:300px;
position:relative;
}

.page{display:none;}
.active{display:block;}

button{
background:#9370DB;
color:white;
border:none;
padding:12px 25px;
border-radius:50px;
cursor:pointer;
margin-top:10px;
}

#run-btn{
position:absolute;
background:#ffb6c1;
}

h2{
color:#FF69B4;
}

/* หัวใจลอย */
.heart{
position:fixed;
color:#ff4d6d;
font-size:20px;
animation:floatUp 3s linear forwards;
}

@keyframes floatUp{
0%{transform:translateY(0);opacity:1;}
100%{transform:translateY(-600px);opacity:0;}
}

/* fireworks */
.firework{
position:fixed;
width:6px;
height:6px;
border-radius:50%;
background:red;
animation:explode 1s ease-out forwards;
}

@keyframes explode{
0%{transform:scale(1);opacity:1;}
100%{transform:scale(15);opacity:0;}
}
</style>
</head>

<body>

<div class="container" id="main-box">

<div id="page1" class="page active">
<h1>บอกชื่อหน่อยย</h1>
<input id="nameInput" placeholder="พิมพ์ชื่อ">
<br><br>
<button onclick="goToPage(2)">ไปต่อ</button>
</div>

<div id="page2" class="page">
<h1 id="greeting"></h1>
<p>เป็นแฟนกันไหม?</p>

<button onclick="loveAction()">เป็น</button>

<button id="run-btn"
onmouseover="moveButton()"
ontouchstart="moveButton()">ไม่เป็น</button>

</div>

<div id="page3" class="page">
<h2>❤️</h2>
<p style="font-size:22px">รักนะค้าบ<br>จู๊บๆๆ</p>

<button onclick="location.reload()">เล่นอีกรอบ</button>
</div>

</div>

<script>

function goToPage(n){
const name=document.getElementById("nameInput").value;

if(n===2 && name.trim()===""){
alert("บอกชื่อมาน้า");
return;
}

document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));

document.getElementById("page"+n).classList.add("active");

}

function moveButton(){

const btn=document.getElementById("run-btn");

const box=document.getElementById("main-box");

const maxX=box.clientWidth-btn.clientWidth;
const maxY=box.clientHeight-btn.clientHeight;

btn.style.left=Math.random()*maxX+"px";
btn.style.top=Math.random()*maxY+"px";
}

function loveAction(){

goToPage(3);

startHearts();

startFireworks();

showLoveMessage();
}

/* ❤️ หัวใจลอย */
function startHearts(){

setInterval(()=>{

const heart=document.createElement("div");

heart.className="heart";

heart.innerHTML="❤️";

heart.style.left=Math.random()*window.innerWidth+"px";

heart.style.top=window.innerHeight+"px";

document.body.appendChild(heart);

setTimeout(()=>heart.remove(),3000);

},200);

}

/* 🎆 fireworks */

function startFireworks(){

for(let i=0;i<30;i++){

const f=document.createElement("div");

f.className="firework";

f.style.left=Math.random()*window.innerWidth+"px";

f.style.top=Math.random()*window.innerHeight+"px";

f.style.background="hsl("+Math.random()*360+",100%,50%)";

document.body.appendChild(f);

setTimeout(()=>f.remove(),1000);

}

}

/* 💌 ข้อความรัก */

function showLoveMessage(){

setTimeout(()=>{

alert("รัก "+document.getElementById("nameInput").value+" นะค้าบ ❤️");

},500);

}

</script>

</body>
</html>
